name: Deploy LOGIC POS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.50.123
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/logic-pos
            git fetch --all
            git reset --hard origin/main
            npm install
            npm run build
            pm2 reload logic-pos
